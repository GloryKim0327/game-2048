<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>2048 经典版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            background: #faf8ef;
            border-radius: 16px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.2);
            padding: 20px;
            width: 100%;
            max-width: 420px;
            position: relative;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .title {
            font-size: 42px;
            font-weight: 700;
            color: #776e65;
        }
        
        .score-container {
            display: flex;
            gap: 8px;
        }
        
        .score-box {
            background: #bbada0;
            padding: 8px 16px;
            border-radius: 8px;
            text-align: center;
            min-width: 70px;
        }
        
        .score-label {
            font-size: 11px;
            color: #eee4da;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        .score-value {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
        }
        
        .new-game-btn {
            background: linear-gradient(135deg, #8f7a66 0%, #a48b75 100%);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(143,122,102,0.4);
        }
        
        .new-game-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(143,122,102,0.5);
        }
        
        .grid-container {
            background: #bbada0;
            border-radius: 12px;
            padding: 12px;
            position: relative;
            width: 100%;
            aspect-ratio: 1;
        }
        
        .grid-background {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
            height: 100%;
        }
        
        .grid-cell {
            background: rgba(238,228,218,0.35);
            border-radius: 8px;
            width: 100%;
            height: 100%;
        }
        
        .tile-container {
            position: absolute;
            top: 12px;
            left: 12px;
            width: calc(100% - 24px);
            height: calc(100% - 24px);
        }
        
        .tile {
            position: absolute;
            width: calc(25% - 9px);
            height: calc(25% - 9px);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
        }
        
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 26px; box-shadow: 0 0 20px rgba(237,207,114,0.7); }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 26px; box-shadow: 0 0 25px rgba(237,204,97,0.8); }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 26px; box-shadow: 0 0 30px rgba(237,200,80,0.9); }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 22px; box-shadow: 0 0 35px rgba(237,197,63,1); }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 22px; box-shadow: 0 0 40px rgba(237,194,46,1); }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 18px; }
        
        .tile-new {
            animation: tileAppear 0.3s ease;
        }
        
        @keyframes tileAppear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .tile-merged {
            animation: tileMerge 0.2s ease;
            z-index: 10;
        }
        
        @keyframes tileMerge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(250,248,239,0.9);
            border-radius: 16px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(8px);
        }
        
        .game-over.show {
            display: flex;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .game-over h2 {
            color: #776e65;
            font-size: 36px;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        .instructions {
            margin-top: 15px;
            text-align: center;
            color: #776e65;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .version {
            margin-top: 10px;
            text-align: center;
            color: #ccc;
            font-size: 10px;
            font-family: monospace;
        }
        
        .footer {
            margin-top: 8px;
            text-align: center;
            color: #aaa;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">2048</div>
            <div class="score-container">
                <div class="score-box">
                    <div class="score-label">分数</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="best">0</div>
                </div>
            </div>
        </div>
        
        <button class="new-game-btn" onclick="initGame()">新游戏</button>
        
        <div class="grid-container">
            <div class="grid-background">
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            </div>
            <div class="tile-container" id="tileContainer"></div>
        </div>
        
        <div class="game-over" id="gameOver">
            <h2>游戏结束!</h2>
            <button class="new-game-btn" onclick="initGame()" style="width: auto; padding: 12px 32px;">再玩一次</button>
        </div>
        
        <div class="instructions">
            <strong>玩法：</strong>使用方向键或滑动屏幕移动方块<br>相同数字合并，达到 2048 获胜
        </div>
        
        <div class="version">v1.4.0 - 2026-03-10</div>
        
        <div class="footer">
            经典 4×4 版本
        </div>
    </div>
    
    <script>
        let grid = [];
        let score = 0;
        let best = localStorage.getItem('2048-best') || 0;
        let tiles = {};
        const size = 4;
        
        function initGame() {
            grid = Array(size).fill(null).map(() => Array(size).fill(0));
            score = 0;
            tiles = {};
            document.getElementById('gameOver').classList.remove('show');
            document.getElementById('best').textContent = best;
            document.getElementById('tileContainer').innerHTML = '';
            addNewTile();
            addNewTile();
            updateDisplay();
        }
        
        function addNewTile() {
            const empty = [];
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    if (grid[i][j] === 0) empty.push({i, j});
                }
            }
            if (empty.length === 0) return;
            const {i, j} = empty[Math.floor(Math.random() * empty.length)];
            grid[i][j] = Math.random() < 0.9 ? 2 : 4;
        }
        
        function getTilePosition(i, j) {
            const gap = 12;
            const containerGap = 12;
            const cellSize = (100 - 3 * gap) / 4;
            const left = containerGap + j * (cellSize + gap);
            const top = containerGap + i * (cellSize + gap);
            return { left: left + '%', top: top + '%' };
        }
        
        function updateDisplay() {
            const container = document.getElementById('tileContainer');
            
            // 移除不存在的方块
            for (const key of Object.keys(tiles)) {
                const [i, j] = key.split('-').map(Number);
                if (grid[i][j] === 0) {
                    tiles[key].element.remove();
                    delete tiles[key];
                }
            }
            
            // 更新或创建方块
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    const value = grid[i][j];
                    if (value > 0) {
                        const key = `${i}-${j}`;
                        const pos = getTilePosition(i, j);
                        
                        if (tiles[key]) {
                            const tile = tiles[key];
                            tile.element.textContent = value;
                            tile.element.className = 'tile tile-' + (value <= 2048 ? value : 'super');
                            tile.element.style.left = pos.left;
                            tile.element.style.top = pos.top;
                            tile.value = value;
                        } else {
                            const tile = document.createElement('div');
                            tile.className = 'tile tile-' + (value <= 2048 ? value : 'super') + ' tile-new';
                            tile.textContent = value;
                            tile.style.left = pos.left;
                            tile.style.top = pos.top;
                            container.appendChild(tile);
                            
                            tiles[key] = {
                                element: tile,
                                value: value
                            };
                        }
                    }
                }
            }
            
            const scoreEl = document.getElementById('score');
            scoreEl.textContent = score;
            
            if (score > best) {
                best = score;
                localStorage.setItem('2048-best', best);
                document.getElementById('best').textContent = best;
            }
        }
        
        function slide(row) {
            let arr = row.filter(val => val !== 0);
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2;
                    score += arr[i];
                    arr[i + 1] = 0;
                }
            }
            arr = arr.filter(val => val !== 0);
            while (arr.length < size) arr.push(0);
            return arr;
        }
        
        function moveLeft() {
            let moved = false;
            for (let i = 0; i < size; i++) {
                const old = [...grid[i]];
                grid[i] = slide(grid[i]);
                if (old.join(',') !== grid[i].join(',')) moved = true;
            }
            return moved;
        }
        
        function moveRight() {
            let moved = false;
            for (let i = 0; i < size; i++) {
                const old = [...grid[i]];
                grid[i].reverse();
                grid[i] = slide(grid[i]);
                grid[i].reverse();
                if (old.join(',') !== grid[i].join(',')) moved = true;
            }
            return moved;
        }
        
        function moveUp() {
            let moved = false;
            for (let j = 0; j < size; j++) {
                const column = [grid[0][j], grid[1][j], grid[2][j], grid[3][j]];
                const old = [...column];
                column.splice(0, 4, ...slide(column));
                for (let i = 0; i < size; i++) {
                    grid[i][j] = column[i];
                }
                if (old.join(',') !== column.join(',')) moved = true;
            }
            return moved;
        }
        
        function moveDown() {
            let moved = false;
            for (let j = 0; j < size; j++) {
                const column = [grid[0][j], grid[1][j], grid[2][j], grid[3][j]];
                const old = [...column];
                column.reverse();
                column.splice(0, 4, ...slide(column));
                column.reverse();
                for (let i = 0; i < size; i++) {
                    grid[i][j] = column[i];
                }
                if (old.join(',') !== column.join(',')) moved = true;
            }
            return moved;
        }
        
        function checkGameOver() {
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    if (grid[i][j] === 0) return false;
                    if (j < size - 1 && grid[i][j] === grid[i][j + 1]) return false;
                    if (i < size - 1 && grid[i][j] === grid[i + 1][j]) return false;
                }
            }
            return true;
        }
        
        function handleMove(direction) {
            let moved = false;
            if (direction === 'left') moved = moveLeft();
            else if (direction === 'right') moved = moveRight();
            else if (direction === 'up') moved = moveUp();
            else if (direction === 'down') moved = moveDown();
            
            if (moved) {
                addNewTile();
                updateDisplay();
                if (checkGameOver()) {
                    document.getElementById('gameOver').classList.add('show');
                }
            }
        }
        
        document.addEventListener('keydown', (e) => {
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
                e.preventDefault();
            }
            if (e.key === 'ArrowLeft') handleMove('left');
            else if (e.key === 'ArrowRight') handleMove('right');
            else if (e.key === 'ArrowUp') handleMove('up');
            else if (e.key === 'ArrowDown') handleMove('down');
        });
        
        let touchStartX, touchStartY;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: true});
        
        document.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;
            const diffX = e.changedTouches[0].clientX - touchStartX;
            const diffY = e.changedTouches[0].clientY - touchStartY;
            
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0) handleMove('right');
                else handleMove('left');
            } else {
                if (diffY > 0) handleMove('down');
                else handleMove('up');
            }
            touchStartX = null;
            touchStartY = null;
        }, {passive: true});
        
        initGame();
    </script>
</body>
</html>
